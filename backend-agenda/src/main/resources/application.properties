spring.application.name=docentia-backend

# ──────────────── CONEXÃO COM BANCO DE DADOS ────────────────
# Modo LOCAL (desenvolvimento): descomente as 3 linhas abaixo
# spring.datasource.url=jdbc:postgresql://localhost:5433/docentia
# spring.datasource.username=admin
# spring.datasource.password=admin_password123

# Modo NUVEM (Render/Supabase): Render injeta DATABASE_URL automaticamente.
# O Spring Boot detecta a variável DATABASE_URL se configurado abaixo.
# Caso use Supabase, defina PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/docentia}
spring.datasource.username=${PGUSER:admin}
spring.datasource.password=${PGPASSWORD:admin_password123}

# ──────────────── PORTA DO SERVIDOR ────────────────
server.port=${PORT:8080}

# ──────────────── COMPORTAMENTO JPA / HIBERNATE ────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
