# ============================================================
#   DOCENTIA — Blueprint de Deploy no Render
#   Plataforma de Gestão Curricular e Docente
#   Desenvolvido por João Pedro Menezes
# ============================================================

services:
  # ────────────────────────────────────────
  # 1. Banco de Dados PostgreSQL
  # ────────────────────────────────────────
  - type: pserv
    name: docentia-db
    plan: free
    runtime: postgres
    region: oregon
    ipAllowList: []

  # ────────────────────────────────────────
  # 2. Backend — API Spring Boot
  # ────────────────────────────────────────
  - type: web
    name: docentia-api
    plan: free
    region: oregon
    runtime: docker
    dockerfilePath: backend-agenda/Dockerfile
    dockerContext: backend-agenda
    envVars:
      - key: DATABASE_URL
        fromService:
          name: docentia-db
          type: pserv
          property: connectionString
      - key: PORT
        value: "8080"
      - key: PGUSER
        fromService:
          name: docentia-db
          type: pserv
          property: user
      - key: PGPASSWORD
        fromService:
          name: docentia-db
          type: pserv
          property: password
    autoDeploy: true

  # ────────────────────────────────────────
  # 3. Frontend — Static Site (React + Vite)
  # ────────────────────────────────────────
  - type: static_site
    name: docentia-frontend
    plan: free
    region: oregon
    buildCommand: cd frontend-agenda && npm install && npm run build
    publishPath: frontend-agenda/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: docentia-api
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html